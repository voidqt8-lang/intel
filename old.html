<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Intel Feed Terminal v4 FIXED</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-green-400 font-mono">

<div class="flex h-screen">

<!-- SIDEBAR -->
<div class="w-80 border-r border-green-500/20 p-4 space-y-4">

  <h1 class="text-xl font-bold text-green-300">
    ◼ NARRATIVE INTEL SYSTEM
  </h1>

  <!-- SUB INPUT -->
  <div class="flex gap-2">
    <input id="sub"
      placeholder="subreddit"
      class="flex-1 bg-black border border-green-500/30 p-2"/>

    <button onclick="addSub()"
      class="border px-2 hover:bg-green-500 hover:text-black">
      +
    </button>
  </div>

  <!-- WATCHLIST -->
  <div>
    <div class="text-xs text-green-500 mb-1">WATCHLIST</div>
    <div id="savedSubs" class="flex flex-wrap gap-1 text-xs"></div>
  </div>

  <!-- SORT -->
  <select id="sort" class="w-full bg-black border p-2">
    <option value="hot">HOT</option>
    <option value="top">TOP</option>
    <option value="new">NEW</option>
  </select>

  <!-- KEYWORD -->
  <input id="keyword"
    placeholder="keyword filter"
    class="w-full bg-black border p-2"/>

  <!-- UPVOTES -->
  <label class="text-xs text-yellow-400">
    MIN UPVOTES: <span id="voteVal">1k</span>
  </label>

  <input type="range"
    id="votes"
    min="0"
    max="50000"
    step="500"
    value="1000"
    class="w-full accent-yellow-400"/>

  <!-- TIME FILTER -->
  <label class="text-xs text-blue-400">TIME WINDOW</label>
  <select id="timeFilter" class="w-full bg-black border p-2">
    <option value="1">Last 1 hour</option>
    <option value="2">Last 2 hours</option>
    <option value="6">Last 6 hours</option>
    <option value="24" selected>Last 24 hours</option>
    <option value="72">Last 3 days</option>
  </select>

  <!-- MODE -->
  <select id="mode" class="w-full bg-black border p-2">
    <option value="all">ALL</option>
    <option value="meme">MEME</option>
  </select>

  <button onclick="fetchPosts()"
    class="w-full border border-green-400 p-2 hover:bg-green-500 hover:text-black">
    RUN SCAN
  </button>

  <div class="text-xs text-green-700">
    STATUS: <span id="status">IDLE</span>
  </div>

</div>

<!-- MAIN -->
<div class="flex-1 p-6 overflow-y-auto">

  <div class="flex justify-between mb-4">
    <h2 class="text-green-300">LIVE INTEL FEED</h2>

    <button onclick="fetchPosts()"
      class="border px-3 py-1 hover:bg-green-500 hover:text-black">
      REFRESH
    </button>
  </div>

  <div id="posts" class="space-y-4"></div>

</div>
</div>

<script>

let savedSubs = JSON.parse(localStorage.getItem("subs") ||
'["cryptocurrency","memes","wallstreetbets"]');

const postsEl = document.getElementById("posts");
const statusEl = document.getElementById("status");
const voteSlider = document.getElementById("votes");
const voteVal = document.getElementById("voteVal");

/* =========================
   FORMATTERS
========================= */

function formatNumber(n){
  if(n>=1e6) return (n/1e6).toFixed(1)+"M";
  if(n>=1e3) return (n/1e3).toFixed(1)+"k";
  return n;
}

function timeAgo(ts){
  const diff = Date.now()/1000 - ts;

  const h = diff/3600;
  const d = diff/86400;

  if(d >= 1) return Math.floor(d) + "d ago";
  if(h >= 1) return Math.floor(h) + "h ago";
  return Math.floor(diff/60) + "m ago";
}

/* =========================
   SLIDER FIX
========================= */

function updateVotesUI(){
  voteVal.textContent = formatNumber(voteSlider.value);
}
voteSlider.addEventListener("input", updateVotesUI);
updateVotesUI();

/* =========================
   WATCHLIST FIX
========================= */

function saveSubs(){
  localStorage.setItem("subs", JSON.stringify(savedSubs));
}

function renderSubs(){
  const el = document.getElementById("savedSubs");

  el.innerHTML = savedSubs.map(s => `
    <div class="flex items-center gap-1">
      <button onclick="setSub('${s}')"
        class="px-2 py-1 border border-green-500/30 rounded hover:bg-green-500 hover:text-black">
        r/${s}
      </button>

      <button onclick="removeSub('${s}')"
        class="text-red-400 text-xs">×</button>
    </div>
  `).join("");
}

function addSub(){
  const input = document.getElementById("sub");
  const val = input.value.trim().toLowerCase();

  if(!val || savedSubs.includes(val)) return;

  savedSubs.push(val);
  saveSubs();
  renderSubs();
}

function removeSub(s){
  savedSubs = savedSubs.filter(x => x !== s);
  saveSubs();
  renderSubs();
}

function setSub(s){
  document.getElementById("sub").value = s;
  fetchPosts();
}

/* =========================
   IMAGE
========================= */

function getImage(p){
  return p.preview?.images?.[0]?.source?.url?.replaceAll("&amp;","&")
  || (p.thumbnail?.startsWith("http") ? p.thumbnail : null);
}

/* =========================
   SCORE
========================= */

function score(p){
  const age = Math.max(1,(Date.now()/1000 - p.createdUtc)/3600);
  return Math.round(p.upvotes / age);
}

/* =========================
   FILTER
========================= */

function isMeme(p){
  return /(meme|doge|pepe|coin|crypto|pump|moon|inu|dog|cat|punch|penguin|elon)/i
    .test(p.title + p.flair);
}

/* =========================
   FETCH
========================= */

async function fetchPosts(){

  const sub = document.getElementById("sub").value || "cryptocurrency";
  const sort = document.getElementById("sort").value;
  const keyword = document.getElementById("keyword").value.toLowerCase();
  const minVotes = +document.getElementById("votes").value;
  const mode = document.getElementById("mode").value;
  const timeH = +document.getElementById("timeFilter").value;

  statusEl.textContent = "SCANNING...";

  const r = await fetch(`http://127.0.0.1:3001/reddit/${sub}/${sort}`);
  const data = await r.json();

  const now = Date.now()/1000;

  let posts = data.posts.filter(p => {
    const ageH = (now - p.createdUtc)/3600;

    return (
      p.upvotes >= minVotes &&
      ageH <= timeH &&
      (!keyword || (p.title+p.flair).toLowerCase().includes(keyword))
    );
  });

  if(mode === "meme") posts = posts.filter(isMeme);
  if(mode === "crypto") posts = posts.filter(isMeme);

  posts.sort((a,b)=>score(b)-score(a));

  statusEl.textContent = posts.length + " signals";

  postsEl.innerHTML = posts.map((p,i)=>{

    const img = getImage(p);
    const s = score(p);

    return `
      <div class="border border-green-500/20 p-3 hover:bg-green-500/10">

        <div class="text-xs flex gap-3">
          <span class="text-yellow-400">⬆ ${formatNumber(p.upvotes)}</span>
          <span class="text-blue-400">⚡ ${s}</span>
          <span>${timeAgo(p.createdUtc)}</span>
        </div>

        <a href="${p.url}" target="_blank"
          class="text-green-300 text-lg hover:underline">
          ${p.title}
        </a>

        ${img ? `<img src="${img}" class="mt-2 max-h-60 rounded"/>` : ``}

      </div>
    `;
  }).join("");
}

/* =========================
   INIT
========================= */

renderSubs();
fetchPosts();

</script>

</body>
</html>
