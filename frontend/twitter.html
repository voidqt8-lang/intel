<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>X Intel</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-blue-300 font-mono">

<!-- TOP NAV -->
<div class="border-b border-blue-500/20 px-4 py-2 flex justify-between items-center">
  <div class="flex gap-4 text-sm">
    <a href="/index.html">◼ SYSTEM</a>
    <span class="opacity-40">|</span>
    <a href="/reddit.html" class="text-green-400">REDDIT</a>
    <span class="text-blue-300 border-b border-blue-400">X INTEL</span>
    <a href="/ai-coin.html" class="text-purple-300 hover:text-purple-200">AI COIN</a>
  </div>

  <div id="trackingState" class="text-red-400 text-xs">
    ● TRACKING OFF
  </div>
</div>

<div class="flex h-screen">

<!-- SIDEBAR -->
<div class="w-80 border-r border-blue-500/20 p-4 space-y-5 overflow-y-auto">

  <h1 class="text-lg">◼ X INTELLIGENCE</h1>

  <!-- ACTIVE TRACK STATUS -->
  <div class="border border-blue-500/20 p-2 text-xs space-y-1">
    <div>STATUS: <span id="statusText">IDLE</span></div>
    <div>ACTIVE QUERY: <span id="activeQuery">NONE</span></div>
  </div>

  <!-- SEARCH -->
  <div class="flex gap-2">
    <input id="search" placeholder="keyword..."
      class="flex-1 bg-black border border-blue-500/30 p-2 text-sm focus:outline-none focus:border-blue-400"/>
    <button onclick="addTracker()" class="border border-blue-500/40 px-2 hover:bg-blue-500/20">+</button>
  </div>

  <input id="tokenRadar" placeholder="token radar (comma/space)"
    class="w-full bg-black border border-blue-500/30 p-2 text-sm rounded mt-2"/>

  <!-- TRACKERS -->
  <div>
    <div class="text-xs text-purple-400 mb-1">TRACKERS</div>
    <div id="trackerList" class="flex flex-wrap gap-1 text-xs"></div>

    <button onclick="toggleTracking()"
      class="w-full mt-2 border border-purple-500 p-2 text-xs hover:bg-purple-500/20 transition-colors">
      START / STOP TRACKING
    </button>
  </div>

  <!-- FILTERS -->
  <div class="space-y-3 border-t border-blue-500/20 pt-3">

    <div>
      <label class="text-xs">MIN VIEWS <span id="minViewsVal" class="text-cyan-400">0</span></label>
      <input type="range" id="minViews" min="0" max="10" step="1" value="0"
        class="w-full accent-cyan-400 mt-1"/>
    </div>

    <div>
      <label class="text-xs block mb-1">TIME WINDOW</label>
      <select id="timeFilter" class="w-full bg-black border border-blue-500/30 p-2 text-sm">
        <option value="1">1H</option>
        <option value="2">2H</option>
        <option value="4">4H</option>
        <option value="6">6H</option>
        <option value="12">12H</option>
        <option value="24" selected>1D</option>
        <option value="48">2D</option>
        <option value="72">3D</option>
      </select>
    </div>

    <div>
      <label class="text-xs block mb-1">MIN FOLLOWERS</label>
      <select id="followers" class="w-full bg-black border border-blue-500/30 p-2 text-sm">
        <option value="0">Any</option>
        <option value="100">100+</option>
        <option value="1000">1K+</option>
        <option value="5000">5K+</option>
        <option value="10000">10K+</option>
        <option value="100000">100K+</option>
      </select>
    </div>

    <div>
      <label class="text-xs block mb-1">VIEW RANGE</label>
      <select id="viewFilter" class="w-full bg-black border border-blue-500/30 p-2 text-sm">
        <option value="all" selected>Any</option>
        <option value="lte_5k">5K and under</option>
        <option value="lte_10k">10K and under</option>
        <option value="lte_20k">20K and under</option>
        <option value="gte_1m">1M+</option>
      </select>
      <p class="text-[10px] text-blue-500/50 leading-snug mt-1">
        X often hides tweet view counts on search; we use API views when present, else engagement-based reach (shown with ~).
      </p>
    </div>

    <div class="space-y-2 pt-1">

      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" id="verifiedOnly" class="accent-blue-400">
        <span class="text-xs">Verified only</span>
      </label>

      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" id="quoteOnly" class="accent-purple-400">
        <span class="text-xs">Quote tweets only</span>
      </label>

      <label class="flex items-center gap-2 cursor-pointer">
        <!-- default unchecked = replies excluded -->
        <input type="checkbox" id="replies" class="accent-yellow-400">
        <span class="text-xs">Include replies</span>
      </label>

    </div>

  </div>

  <!-- SCAN -->
  <button onclick="fetchTweets()"
    class="w-full border border-blue-400 p-2 hover:bg-blue-500 hover:text-black transition-colors text-sm">
    ▶ RUN SCAN
  </button>

</div>

<!-- MAIN -->
<div class="flex-1 p-6 overflow-y-auto">
  <h2 class="mb-4 text-blue-400 tracking-widest text-sm">LIVE SIGNAL FEED</h2>

  <!-- Intel Brief -->
  <div class="mt-6 border border-blue-500/20 rounded p-4 bg-black/30">
    <div class="flex justify-between items-center gap-3">
      <h3 class="text-blue-200 text-sm font-semibold">INTEL BRIEF</h3>
      <div class="flex items-center gap-2">
        <label class="flex items-center gap-1 text-xs text-blue-300 cursor-pointer">
          <input id="autoBrief" type="checkbox" class="accent-blue-400" />
          AUTO
        </label>
        <button id="briefBtn"
          class="border border-blue-400 px-3 py-1 text-xs hover:bg-blue-500 hover:text-black rounded">
          GENERATE
        </button>
      </div>
    </div>

    <div class="mt-2 text-xs text-blue-200">
      STATUS: <span id="briefStatus">IDLE</span>
    </div>
    <div id="briefMomentum" class="mt-2 text-xs text-purple-300"></div>
    <pre id="briefText"
      class="mt-2 whitespace-pre-wrap text-xs text-blue-200 leading-relaxed border border-blue-500/10 bg-black/50 rounded p-3">No briefing yet.</pre>
  </div>

  <div id="feed" class="space-y-3"></div>
</div>

</div>

<script src="/twitter.js"></script>
</body>
</html>
