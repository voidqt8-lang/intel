<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X Intel - AI Coin Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-green-300 font-mono">
  <div class="border-b border-green-500/20 px-4 py-2 flex justify-between items-center">
    <div class="flex gap-4 text-sm">
      <a href="/index.html" class="text-green-200 hover:text-green-100">◼ SYSTEM</a>
      <span class="opacity-40">|</span>
      <a href="/reddit.html" class="text-green-400 hover:text-green-100">REDDIT</a>
      <a href="/twitter.html" class="text-blue-300 hover:text-blue-100">X</a>
    </div>
    <div class="text-xs text-green-700">AI COIN FORGE</div>
  </div>

  <div class="max-w-5xl mx-auto p-6">
    <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
      <div class="md:col-span-2 border border-green-500/20 rounded p-4 bg-black/40">
        <h1 class="text-lg text-green-200 mb-3">Generate a coin from a post</h1>

        <div class="space-y-3">
          <div>
            <label class="text-xs text-green-500 block mb-1">POST TITLE</label>
            <input id="title" class="w-full bg-black border border-green-500/30 p-2 rounded"
              placeholder="e.g. 'New memecoin just launched!'" />
          </div>

          <div>
            <label class="text-xs text-green-500 block mb-1">SUBREDDIT</label>
            <input id="subreddit" value="memes"
              class="w-full bg-black border border-green-500/30 p-2 rounded"
              placeholder="memes" />
          </div>

          <div>
            <label class="text-xs text-green-500 block mb-1">OPTIONAL FLAIR</label>
            <input id="flair" class="w-full bg-black border border-green-500/30 p-2 rounded"
              placeholder="e.g. 'Meme' (optional)" />
          </div>

          <button id="generateBtn"
            class="w-full border border-green-400 p-2 hover:bg-green-500 hover:text-black rounded transition-colors">
            ▶ GENERATE COIN
          </button>

          <div class="text-xs text-green-700">
            STATUS: <span id="status">IDLE</span>
          </div>

          <div class="text-red-400 text-sm" id="error" aria-live="polite"></div>
        </div>
      </div>

      <div class="md:col-span-3 border border-green-500/20 rounded p-4 bg-black/40">
        <h2 class="text-lg text-blue-200 mb-3">Result</h2>

        <div class="flex gap-2 mb-3">
          <button id="saveBtn"
            class="border border-blue-400 p-2 hover:bg-blue-500 hover:text-black rounded transition-colors flex-1">
            SAVE TO HISTORY
          </button>
          <button id="clearBtn"
            class="border border-red-400 p-2 hover:bg-red-500 hover:text-black rounded transition-colors">
            CLEAR
          </button>
        </div>

        <pre id="result"
          class="whitespace-pre-wrap border border-green-500/20 bg-black/60 rounded p-3 text-xs text-green-200 min-h-[120px]">No coin generated yet.</pre>

        <div class="mt-4">
          <h3 class="text-sm text-purple-300 mb-2">History</h3>
          <div id="history" class="space-y-2"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/ai-coin.js"></script>
</body>
</html>
